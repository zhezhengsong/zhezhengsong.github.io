  I'm a third year CS major student from Xi'an Jiaotong University, now I'm studying at UC Berkeley.
  My major interests are in **Programming Language** and **Algorithm**.

  I started to learn coding since I was 10 using *QuickBASIC* and *Pascal*. Now I can write with a lot of languages. I feel very lucky to have this experience and I wrote a [blog](https://zhezhengsong.github.io/posts/my-coding-experience) about it.

  I was born in Bengbu, China and moved to Hefei when I was very young. I still live there and I really love the city as well as the people there.

  Playing basketball and watching animation are my biggest hobbies in my spare time. My favourite animation is JOJO. But exchange of ideas can bring me the greatest pleasure

